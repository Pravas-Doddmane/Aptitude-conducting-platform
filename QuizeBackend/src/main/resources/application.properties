spring.application.name=QuizeBackend

server.port=${SERVER_PORT:8081}

# PostgreSQL Database Configuration

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA Configuration

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.sql.init.mode=never

# JWT

app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.access-token-ttl=PT15M
app.security.jwt.refresh-token-ttl=P7D

# Serialization

spring.jackson.serialization.write-dates-as-timestamps=false

# Bootstrap Admin

app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD}

# File Upload

app.upload.dir=${UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# CORS

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:[http://localhost:5173,http://localhost:3000}](http://localhost:5173,http://localhost:3000})

# Local AI Provider

app.ai.base-url=${AI_BASE_URL:[http://127.0.0.1:1234}](http://127.0.0.1:1234})
app.ai.model=${AI_MODEL:gemma-4-e4b-it}
app.ai.temperature=${AI_TEMPERATURE:0.0}
app.ai.max-tokens=${AI_MAX_TOKENS:4096}
app.ai.seed=${AI_SEED:42}
app.ai.top-p=${AI_TOP_P:1.0}
app.ai.connect-timeout-seconds=${AI_CONNECT_TIMEOUT_SECONDS:5}
app.ai.read-timeout-seconds=${AI_READ_TIMEOUT_SECONDS:90}
app.ai.max-document-chars=${AI_MAX_DOCUMENT_CHARS:6000}

# Email

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true